# ======================
# Basics
# ======================
DESIGN_NAME: Top
VERILOG_FILES:
  - dir::RTL/DFF.v
  - dir::RTL/Booth_Encoder.v
  - dir::RTL/BrentKung.v
  - dir::RTL/Partial_Products.v
  - dir::RTL/Partial_Products_Adder.v
  - dir::RTL/Top.v
  - dir::RTL/MAC.v
CLOCK_PORT: clk
CLOCK_PERIOD: 16

PNR_SDC_FILE: dir::constraints/impl.sdc
SIGNOFF_SDC_FILE: dir::constraints/signoff.sdc

# ======================
# Floorplan / Utilization
# ======================
FP_CORE_UTIL: 55
PL_TARGET_DENSITY_PCT: 60

# ======================
# PDN
# ======================
FP_PDN_VOFFSET: 5
FP_PDN_HOFFSET: 5
FP_PDN_VWIDTH: 2
FP_PDN_HWIDTH: 2
FP_PDN_VPITCH: 30
FP_PDN_HPITCH: 30
FP_PDN_SKIPTRIM: true

# ======================
# Pin Order
# ======================
# FP_PIN_ORDER_CFG: dir::pin_order.cfg  # uncomment if pin_order.cfg exists

# ======================
# Synthesis / Timing Control
# ======================
MAX_FANOUT_CONSTRAINT: 3
SYNTH_STRATEGY: AREA 2
SYNTH_OPT: true

# ======================
# Technology Overrides
# ======================
pdk::sky130*:
  CLOCK_PERIOD: 16

  scl::sky130_fd_sc_hs:
    CLOCK_PERIOD: 16

  scl::sky130_fd_sc_ls:
    MAX_FANOUT_CONSTRAINT: 3
